<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build & Sell with Claude Code — 復習ノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8e8e8;
    --text2: #999;
    --text3: #666;
    --accent: #7ee8a2;
    --accent2: #3ecf8e;
    --tag-bg: rgba(126,232,162,0.1);
    --tag-text: #7ee8a2;
    --note-bg: rgba(255,255,255,0.04);
    --code-bg: rgba(255,255,255,0.08);
    --chapter-colors: #7ee8a2, #60b4ff, #ff9f7e, #c084fc, #fbbf24;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* Header */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 1.25rem;
  }
  .site-header h1 {
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 0.6rem 1rem 0.6rem 2.25rem;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent2);
  }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  /* Main */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  /* Chapter */
  .chapter { margin-bottom: 2.5rem; }
  .chapter-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .chapter-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .chapter-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--text2);
    text-transform: uppercase;
  }
  .chapter-line {
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border2); }
  .card.open { border-color: var(--border2); }

  .card-toggle {
    width: 100%;
    background: none;
    border: none;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    text-align: left;
  }

  .card-term {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .card-en {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-arrow {
    color: var(--text3);
    font-size: 12px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .card.open .card-arrow { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 0.5px solid var(--border);
    margin-top: 0;
  }
  .card.open .card-body { display: block; }

  .card-body-inner {
    padding-top: 1rem;
    font-size: 14px;
    color: var(--text2);
    line-height: 1.8;
  }

  .card-body-inner strong {
    color: var(--text);
    font-weight: 500;
  }

  .card-body-inner code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--code-bg);
    padding: 0.15em 0.5em;
    border-radius: 4px;
    color: var(--accent);
  }

  .card-body-inner ol, .card-body-inner ul {
    padding-left: 1.25rem;
    margin-top: 0.5rem;
  }
  .card-body-inner li { margin-bottom: 4px; }

  .note {
    margin-top: 0.75rem;
    padding: 0.6rem 0.85rem;
    background: var(--note-bg);
    border-left: 2px solid var(--accent2);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--text2);
  }

  /* No results */
  .no-results {
    color: var(--text3);
    font-size: 14px;
    padding: 2rem 0;
    text-align: center;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 12px;
    color: var(--text3);
    border-top: 0.5px solid var(--border);
  }

  @media (min-width: 600px) {
    .site-header { padding: 1.25rem 2rem; }
    main { padding: 2rem 2rem 4rem; }
    .card-toggle { padding: 1.1rem 1.5rem; }
    .card-body { padding: 0 1.5rem 1.5rem; }
  }
</style>
</head>

function render(filter = "") {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const q = filter.toLowerCase();
  let totalFound = 0;

  chapters.forEach((ch, ci) => {
    const color = CHAPTER_COLORS[ci % CHAPTER_COLORS.length];
    const filtered = ch.cards.filter(c =>
      c.term.toLowerCase().includes(q) ||
      c.en.toLowerCase().includes(q) ||
      c.body.toLowerCase().includes(q) ||
      (c.note && c.note.toLowerCase().includes(q))
    );
    if (!filtered.length) return;
    totalFound += filtered.length;

    const section = document.createElement("div");
    section.className = "chapter";
    section.innerHTML = `
      <div class="chapter-header">
        <div class="chapter-dot" style="background:${color}"></div>
        <span class="chapter-label">${ch.title}</span>
        <div class="chapter-line"></div>
      </div>
      <div class="cards"></div>
    `;
    const grid = section.querySelector(".cards");

    filtered.forEach(card => {
      const el = document.createElement("div");
      el.className = "card";
      el.innerHTML = `
        <button class="card-toggle" aria-expanded="false">
          <span class="card-term">${card.term}</span>
          <span class="card-en">${card.en}</span>
          <span class="card-arrow">▾</span>
        </button>
        <div class="card-body">
          <div class="card-body-inner">
            ${card.body}
            ${card.note ? `<div class="note">${card.note}</div>` : ""}
          </div>
        </div>
      `;
      el.querySelector(".card-toggle").addEventListener("click", () => {
        el.classList.toggle("open");
      });
      grid.appendChild(el);
    });

    main.appendChild(section);
  });

  if (!totalFound) {
    main.innerHTML = `<p class="no-results">「${filter}」に一致する用語が見つかりませんでした。</p>`;
  }
}

function filterCards() {
  render(document.getElementById("search").value);
}

render();
</script>
</body>
</html>
