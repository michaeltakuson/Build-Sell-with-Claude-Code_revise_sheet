    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  .cards { display: flex; flex-direction: column; gap: 8px; }

    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;

  .card:hover { border-color: var(--border2); }
  .card.open { border-color: var(--border2); }

  .card-toggle {
    width: 100%;
    background: none;
    border: none;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    text-align: left;

    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    flex: 1;

  .card-en {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;

    color: var(--text3);
    font-size: 12px;
    flex-shrink: 0;
    transition: transform 0.2s;

  .card.open .card-arrow { transform: rotate(180deg); }

    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 0.5px solid var(--border);
    margin-top: 0;
  }
  .card.open .card-body { display: block; }

  .card-body-inner {
    padding-top: 1rem;
    font-size: 14px;
    color: var(--text2);
    line-height: 1.8;
  }

  .card-body-inner strong {
    color: var(--text);
    font-weight: 500;
  }

    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--code-bg);
    padding: 0.15em 0.5em;
    border-radius: 4px;
    color: var(--accent);

    padding-left: 1.25rem;
    margin-top: 0.5rem;

  .card-body-inner li { margin-bottom: 4px; }

    font-size: 12px;
    color: var(--text3);

    .site-header { padding: 1.25rem 2rem; }
    main { padding: 2rem 2rem 4rem; }
    .card-toggle { padding: 1.1rem 1.5rem; }
    .card-body { padding: 0 1.5rem 1.5rem; }

</style>

function render(filter = "") {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const q = filter.toLowerCase();
  let totalFound = 0;

  chapters.forEach((ch, ci) => {
    const color = CHAPTER_COLORS[ci % CHAPTER_COLORS.length];
    const filtered = ch.cards.filter(c =>
      c.term.toLowerCase().includes(q) ||
      c.en.toLowerCase().includes(q) ||
      c.body.toLowerCase().includes(q) ||
      (c.note && c.note.toLowerCase().includes(q))
    );
    if (!filtered.length) return;
    totalFound += filtered.length;

    const section = document.createElement("div");
    section.className = "chapter";
    section.innerHTML = `
      <div class="chapter-header">
        <div class="chapter-dot" style="background:${color}"></div>
        <span class="chapter-label">${ch.title}</span>
        <div class="chapter-line"></div>
      </div>
      <div class="cards"></div>
    `;
    const grid = section.querySelector(".cards");

    filtered.forEach(card => {
      const el = document.createElement("div");
      el.className = "card";
      el.innerHTML = `
        <button class="card-toggle" aria-expanded="false">
          <span class="card-term">${card.term}</span>
          <span class="card-en">${card.en}</span>
          <span class="card-arrow">▾</span>
        </button>
        <div class="card-body">
          <div class="card-body-inner">
            ${card.body}
            ${card.note ? `<div class="note">${card.note}</div>` : ""}
          </div>
        </div>
      `;
      el.querySelector(".card-toggle").addEventListener("click", () => {
        el.classList.toggle("open");
      });
      grid.appendChild(el);
    });

    main.appendChild(section);
  });

  if (!totalFound) {
    main.innerHTML = `<p class="no-results">「${filter}」に一致する用語が見つかりませんでした。</p>`;
  }
}

function filterCards() {
  render(document.getElementById("search").value);
}

document.addEventListener("DOMContentLoaded", function() { render(); });
